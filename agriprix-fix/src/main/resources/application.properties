# ============================================
# Configuration PostgreSQL (Production Render)
# ============================================
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:agriprixdb}
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASSWORD:}

# Driver auto-détecté selon l'URL
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Thymeleaf
spring.thymeleaf.cache=true
spring.thymeleaf.suffix=.html
spring.thymeleaf.prefix=classpath:/templates/

# Port (Render injecte $PORT automatiquement)
server.port=${PORT:8080}

# Logging
logging.level.cm.agriprix=INFO
