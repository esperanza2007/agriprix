<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion — AgriPrix</title>
    <link rel="manifest" th:href="@{/manifest.json}">
    <meta name="theme-color" content="#1a9e5f">
    <link rel="stylesheet" th:href="@{/css/agriprix.css}">
</head>
<body>
<div class="auth-wrapper">
    <div class="auth-container">

        <div class="auth-logo">
            <div class="logo-icon">🌾</div>
            <h1>AgriPrix</h1>
            <p>Extrême-Nord, Cameroun</p>
        </div>

        <div class="auth-card">
            <h2>Connexion</h2>

            <div th:if="${param.error}" class="alert alert-error">
                ❌ Téléphone ou mot de passe incorrect.
            </div>
            <div th:if="${param.logout}" class="alert alert-success">
                ✅ Vous avez été déconnecté.
            </div>

            <form th:action="@{/login}" method="post">
                <div class="form-group">
                    <label class="form-label" for="telephone">📱 Numéro de téléphone</label>
                    <input class="form-control" type="text" id="telephone" name="telephone"
                           placeholder="ex : 677123456" required autofocus>
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">🔒 Mot de passe</label>
                    <input class="form-control" type="password" id="password" name="password"
                           placeholder="••••••" required>
                </div>
                <button type="submit" class="btn-calculer">Se connecter</button>
            </form>

            <p style="text-align:center; margin-top:1.2rem; font-size:0.86rem; color:var(--texte-secondaire);">
                Pas de compte ?
                <a th:href="@{/inscription}" style="color:var(--vert); font-weight:600;">S'inscrire</a>
            </p>
        </div>

        <div style="margin-top:1rem; padding:1rem; background:#f0faf5; border-radius:10px; font-size:0.78rem; color:var(--texte-secondaire); line-height:1.8;">
            <strong style="color:var(--vert);">Comptes de démo :</strong><br>
            🌾 Producteur : <code>677123456</code> / <code>amadou123</code><br>
            🏪 Commerçant : <code>655987654</code> / <code>fatime123</code><br>
            ⚙️ Admin : <code>699000000</code> / <code>admin123</code>
        </div>

    </div>
</div>
</body>
</html>
