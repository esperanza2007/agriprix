<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(content=~{::main}, activeTab='admin', pageTitle='Produit')}">
<body>
<main th:fragment="main">

    <div style="display:flex;align-items:center;gap:12px;margin-bottom:1.5rem;">
        <a th:href="@{/admin}" style="color:#1a9e5f;text-decoration:none;">← Retour</a>
        <p class="page-title" style="margin:0;"
           th:text="${mode == 'ajout' ? '➕ Ajouter un produit' : '✏️ Modifier le produit'}">
            Produit
        </p>
    </div>

    <div style="max-width:480px;">
        <form th:action="${mode == 'ajout' ? '/admin/produits/ajouter' : '/admin/produits/modifier/' + produit.id}"
              method="post"
              style="background:white;border:1px solid #e0e0e0;border-radius:12px;padding:1.5rem;">

            <div style="margin-bottom:1rem;">
                <label style="display:block;font-weight:500;margin-bottom:6px;">Emoji *</label>
                <input type="text" name="emoji" required
                       th:value="${produit.emoji}"
                       placeholder="ex: 🌽"
                       style="width:100%;padding:10px;border:1px solid #ddd;border-radius:8px;
                              font-size:22px;box-sizing:border-box;">
                <small style="color:#888;">Copie un emoji depuis emojipedia.org</small>
            </div>

            <div style="margin-bottom:1rem;">
                <label style="display:block;font-weight:500;margin-bottom:6px;">Nom du produit *</label>
                <input type="text" name="nom" required
                       th:value="${produit.nom}"
                       placeholder="ex: Manioc"
                       style="width:100%;padding:10px;border:1px solid #ddd;border-radius:8px;
                              font-size:15px;box-sizing:border-box;">
            </div>

            <div style="margin-bottom:1.5rem;">
                <label style="display:block;font-weight:500;margin-bottom:6px;">Catégorie *</label>
                <select name="categorie" required
                        style="width:100%;padding:10px;border:1px solid #ddd;border-radius:8px;font-size:15px;">
                    <option th:each="cat : ${categories}"
                            th:value="${cat}"
                            th:text="${cat}"
                            th:selected="${cat == produit.categorie}">
                    </option>
                </select>
            </div>

            <div style="display:flex;gap:10px;">
                <button type="submit"
                        style="flex:1;background:#1a9e5f;color:white;padding:12px;border:none;
                               border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;"
                        th:text="${mode == 'ajout' ? '✅ Ajouter' : '✅ Enregistrer'}">
                    Enregistrer
                </button>
                <a th:href="@{/admin}"
                   style="padding:12px 20px;border:1px solid #ccc;border-radius:8px;
                          text-decoration:none;font-size:15px;color:#333;">
                    Annuler
                </a>
            </div>
        </form>
    </div>

</main>
</body>
</html>
