<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(content=~{::main}, activeTab='admin', pageTitle='Administration')}">
<body>
<main th:fragment="main">

    <p class="page-title">⚙️ Administration</p>
    <p class="page-subtitle">Gestion des produits et utilisateurs</p>

    <!-- Messages flash -->
    <div th:if="${succes}"
         style="background:#d4edda;color:#155724;padding:12px 16px;border-radius:8px;
                margin-bottom:1rem;border:1px solid #c3e6cb;">
        ✅ <span th:text="${succes}"></span>
    </div>

    <!-- Stats -->
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:1.5rem;">
        <div style="background:white;border-radius:10px;padding:1rem;border:1px solid #e0e0e0;text-align:center;">
            <div style="font-size:28px;">📦</div>
            <div style="font-size:24px;font-weight:600;color:#1a9e5f;" th:text="${totalProduits}">0</div>
            <div style="font-size:13px;color:#888;">Produits</div>
        </div>
        <div style="background:white;border-radius:10px;padding:1rem;border:1px solid #e0e0e0;text-align:center;">
            <div style="font-size:28px;">👥</div>
            <div style="font-size:24px;font-weight:600;color:#1a9e5f;" th:text="${totalUtilisateurs}">0</div>
            <div style="font-size:13px;color:#888;">Utilisateurs</div>
        </div>
        <div style="background:white;border-radius:10px;padding:1rem;border:1px solid #e0e0e0;text-align:center;">
            <a th:href="@{/messages}" style="text-decoration:none;color:inherit;">
                <div style="font-size:28px;">💬</div>
                <div style="font-size:13px;color:#1a9e5f;font-weight:500;">Messagerie</div>
            </a>
        </div>
    </div>

    <!-- Gestion produits -->
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;">
        <p class="section-title" style="margin:0;">📦 Produits</p>
        <a th:href="@{/admin/produits/ajouter}"
           style="background:#1a9e5f;color:white;padding:8px 16px;border-radius:8px;
                  text-decoration:none;font-size:14px;font-weight:500;">
            ➕ Ajouter un produit
        </a>
    </div>

    <div style="background:white;border:1px solid #e0e0e0;border-radius:12px;overflow:hidden;">
        <table style="width:100%;border-collapse:collapse;font-size:14px;">
            <thead>
            <tr style="background:#f8f9fa;border-bottom:2px solid #dee2e6;">
                <th style="padding:12px 16px;text-align:left;">Produit</th>
                <th style="padding:12px 16px;text-align:left;">Catégorie</th>
                <th style="padding:12px 16px;text-align:center;">Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="produit : ${produits}"
                style="border-bottom:1px solid #f0f0f0;">
                <td style="padding:12px 16px;">
                    <span th:text="${produit.emoji}" style="font-size:18px;">🌽</span>
                    <span th:text="${produit.nom}" style="font-weight:500;margin-left:8px;">Maïs</span>
                </td>
                <td style="padding:12px 16px;color:#666;" th:text="${produit.categorie}">Céréales</td>
                <td style="padding:12px 16px;text-align:center;">
                    <a th:href="@{'/admin/produits/modifier/' + ${produit.id}}"
                       style="color:#007bff;text-decoration:none;margin-right:12px;font-size:13px;">
                        ✏️ Modifier
                    </a>
                    <form th:action="@{'/admin/produits/supprimer/' + ${produit.id}}"
                          method="post" style="display:inline;"
                          onsubmit="return confirm('Supprimer ce produit et tout son historique ?')">
                        <button type="submit"
                                style="background:none;border:none;color:#dc3545;
                                           cursor:pointer;font-size:13px;padding:0;">
                            🗑️ Supprimer
                        </button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <!-- Lien gestion utilisateurs -->
    <div style="margin-top:1.5rem;">
        <a th:href="@{/admin/utilisateurs}"
           style="color:#1a9e5f;text-decoration:none;font-size:14px;">
            👥 Voir tous les utilisateurs →
        </a>
    </div>

</main>
</body>
</html>
