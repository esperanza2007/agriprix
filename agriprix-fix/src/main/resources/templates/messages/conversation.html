<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(content=~{::main}, activeTab='messages', pageTitle='Conversation')}">
<body>
<main th:fragment="main">

    <div style="display:flex;gap:1rem;height:calc(100vh - 160px);max-height:600px;">

        <!-- Sidebar conversations (admin uniquement) -->
        <div th:if="${tousUtilisateurs != null}"
             style="width:220px;flex-shrink:0;background:white;border:1px solid #e0e0e0;
                    border-radius:12px;overflow-y:auto;display:flex;flex-direction:column;">
            <div style="padding:12px 16px;font-weight:500;font-size:14px;
                        border-bottom:1px solid #f0f0f0;color:#555;">
                💬 Conversations
            </div>
            <a th:each="u : ${tousUtilisateurs}"
               th:href="@{'/messages/' + ${u.id}}"
               th:style="${u.id == interlocuteur.id ? 'background:#f0faf5;' : ''}"
               style="display:flex;align-items:center;gap:10px;padding:10px 14px;
                      text-decoration:none;color:#333;border-bottom:1px solid #f5f5f5;font-size:13px;">
                <span>👤</span>
                <div>
                    <div style="font-weight:500;" th:text="${u.nom}">Nom</div>
                    <div style="font-size:11px;color:#aaa;" th:text="${u.role}">ROLE</div>
                </div>
            </a>
        </div>

        <!-- Zone de conversation -->
        <div style="flex:1;display:flex;flex-direction:column;min-width:0;">

            <!-- En-tête -->
            <div style="background:white;border:1px solid #e0e0e0;border-radius:12px 12px 0 0;
                        padding:12px 16px;display:flex;align-items:center;gap:12px;">
                <a th:href="@{/messages}" style="color:#1a9e5f;text-decoration:none;font-size:20px;">←</a>
                <div style="width:38px;height:38px;border-radius:50%;background:#e8f5e9;
                            display:flex;align-items:center;justify-content:center;">👤</div>
                <div>
                    <div style="font-weight:500;" th:text="${interlocuteur.nom}">Nom</div>
                    <div style="font-size:12px;color:#888;" th:text="${interlocuteur.role}">ROLE</div>
                </div>
            </div>

            <!-- Messages -->
            <div id="messagesZone"
                 style="flex:1;overflow-y:auto;padding:16px;background:#f9fafb;
                        border-left:1px solid #e0e0e0;border-right:1px solid #e0e0e0;
                        display:flex;flex-direction:column;gap:10px;">

                <div th:if="${messages.isEmpty()}"
                     style="text-align:center;color:#aaa;margin:auto;font-size:14px;">
                    Démarrez la conversation 👋
                </div>

                <div th:each="msg : ${messages}"
                     th:with="estMoi=${msg.expediteur.id == moi.id}"
                     th:style="${estMoi ? 'align-self:flex-end;' : 'align-self:flex-start;'}">
                    <div th:style="${estMoi ?
                        'background:#1a9e5f;color:white;' :
                        'background:white;color:#333;border:1px solid #e0e0e0;'}"
                         style="padding:10px 14px;border-radius:16px;max-width:280px;
                                font-size:14px;line-height:1.5;word-wrap:break-word;">
                        <span th:text="${msg.contenu}">Message</span>
                    </div>
                    <div style="font-size:11px;color:#aaa;margin-top:3px;text-align:right;"
                         th:text="${#temporals.format(msg.dateEnvoi, 'dd/MM HH:mm')}">
                        12:30
                    </div>
                </div>
            </div>

            <!-- Zone de saisie -->
            <div style="background:white;border:1px solid #e0e0e0;border-radius:0 0 12px 12px;padding:12px;">
                <form th:action="@{/messages/envoyer}" method="post"
                      style="display:flex;gap:10px;align-items:flex-end;">
                    <input type="hidden" name="destinataireId" th:value="${interlocuteur.id}">
                    <textarea name="contenu" rows="2" placeholder="Écrire un message..."
                              required
                              style="flex:1;padding:10px 14px;border:1px solid #ddd;border-radius:10px;
                                     font-size:14px;resize:none;font-family:inherit;"
                              onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();this.form.submit();}">
                    </textarea>
                    <button type="submit"
                            style="padding:10px 18px;background:#1a9e5f;color:white;border:none;
                                   border-radius:10px;cursor:pointer;font-size:20px;flex-shrink:0;">
                        ➤
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script>
        // Auto-scroll vers le bas
        const zone = document.getElementById('messagesZone');
        if (zone) zone.scrollTop = zone.scrollHeight;
    </script>

</main>
</body>
</html>
