<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(content=~{::main}, activeTab='messages', pageTitle='Messagerie')}">
<body>
<main th:fragment="main">

    <p class="page-title">💬 Messagerie</p>
    <p class="page-subtitle">Service client — Contactez l'administration</p>

    <!-- Admin : démarrer une nouvelle conversation -->
    <div th:if="${tousUtilisateurs != null}" style="margin-bottom:1.5rem;">
        <p class="section-title">Contacter un utilisateur</p>
        <div style="display:flex;flex-wrap:wrap;gap:8px;">
            <a th:each="u : ${tousUtilisateurs}"
               th:href="@{'/messages/' + ${u.id}}"
               style="display:inline-flex;align-items:center;gap:8px;padding:8px 14px;
                      background:white;border:1px solid #e0e0e0;border-radius:20px;
                      text-decoration:none;color:#333;font-size:14px;">
                <span>👤</span>
                <span th:text="${u.nom}">Utilisateur</span>
                <span th:text="'(' + ${u.role} + ')'"
                      style="color:#888;font-size:12px;">(PRODUCTEUR)</span>
            </a>
        </div>
    </div>

    <!-- Conversations existantes -->
    <p class="section-title">Mes conversations</p>

    <div th:if="${interlocuteurs.isEmpty()}"
         style="text-align:center;padding:2rem;color:#888;background:white;border-radius:12px;border:1px solid #eee;">
        <div style="font-size:40px;margin-bottom:8px;">💬</div>
        <p>Aucune conversation pour l'instant.</p>
        <p th:unless="${moi.role.name() == 'ADMIN'}" style="font-size:14px;">
            Contactez l'administration pour toute question.
        </p>
        <a th:unless="${moi.role.name() == 'ADMIN'}"
           th:href="@{'/messages/nouveau/1'}"
           style="display:inline-block;margin-top:12px;padding:10px 20px;
                  background:#1a9e5f;color:white;border-radius:8px;text-decoration:none;">
            ✉️ Contacter l'Admin
        </a>
    </div>

    <div th:each="interlocuteur : ${interlocuteurs}"
         style="background:white;border:1px solid #e0e0e0;border-radius:12px;
                margin-bottom:10px;overflow:hidden;">
        <a th:href="@{'/messages/' + ${interlocuteur.id}}"
           style="display:flex;align-items:center;gap:14px;padding:14px 16px;text-decoration:none;color:#333;">
            <div style="width:44px;height:44px;border-radius:50%;background:#e8f5e9;
                        display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;">
                👤
            </div>
            <div style="flex:1;">
                <div style="font-weight:500;" th:text="${interlocuteur.nom}">Nom</div>
                <div style="font-size:13px;color:#888;" th:text="${interlocuteur.role}">PRODUCTEUR</div>
            </div>
            <div style="color:#1a9e5f;font-size:13px;">→</div>
        </a>
    </div>

    <!-- Bouton contacter admin pour non-admin -->
    <div th:if="${moi.role.name() != 'ADMIN' and interlocuteurs.isEmpty() == false}"
         style="margin-top:1rem;text-align:center;">
        <a th:href="@{'/messages/1'}"
           style="display:inline-block;padding:10px 24px;background:#1a9e5f;
                  color:white;border-radius:8px;text-decoration:none;font-weight:500;">
            ✉️ Contacter l'Administration
        </a>
    </div>

</main>
</body>
</html>
